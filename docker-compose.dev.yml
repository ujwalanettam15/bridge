services:
  # Local Postgres for offline dev.
  # For demo: replace DATABASE_URL in .env with the Ghost connection string
  # from `ghost connect bridge-prod` to use the real Ghost-hosted database.
  # Ghost adds pgmq, vector, and database forking on top of standard Postgres.
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: bridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
