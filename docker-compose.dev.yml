services:
  # Local Postgres for offline dev. For the live demo, set DATABASE_URL in .env
  # to the Ghost/TigerData connection string so the same audit tables run there.
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: bridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
